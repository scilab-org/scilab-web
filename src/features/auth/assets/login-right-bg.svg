<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Vertical gradient: soft yellow-lime → teal-green → deep teal -->
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#c8e06a"/>
      <stop offset="18%"  stop-color="#88c464"/>
      <stop offset="38%"  stop-color="#3fa888"/>
      <stop offset="62%"  stop-color="#1c7a78"/>
      <stop offset="80%"  stop-color="#0e5260"/>
      <stop offset="100%" stop-color="#072e3a"/>
    </linearGradient>

    <!-- Soft radial highlight at top (light flare) -->
    <radialGradient id="topFlare" cx="60%" cy="0%" r="55%">
      <stop offset="0%"   stop-color="#e8f0a0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#e8f0a0" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle vignette for depth -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="80%">
      <stop offset="65%"  stop-color="transparent"/>
      <stop offset="100%" stop-color="#051a22" stop-opacity="0.30"/>
    </radialGradient>

    <!-- Very fine noise texture -->
    <filter id="noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch" result="n"/>
      <feColorMatrix type="saturate" values="0" in="n" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="soft-light" result="blend"/>
      <feComponentTransfer in="blend">
        <feFuncA type="linear" slope="0.06"/>
      </feComponentTransfer>
      <feComposite in="SourceGraphic" in2="blend" operator="over"/>
    </filter>
  </defs>

  <!-- Base gradient panel -->
  <rect width="720" height="900" fill="url(#panel)"/>

  <!-- Top radial flare -->
  <rect width="720" height="900" fill="url(#topFlare)"/>

  <!-- Subtle grid overlay (very faint, only on darker lower half) -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="0.5">
    <line x1="0" y1="450" x2="720" y2="450"/>
    <line x1="0" y1="540" x2="720" y2="540"/>
    <line x1="0" y1="630" x2="720" y2="630"/>
    <line x1="0" y1="720" x2="720" y2="720"/>
    <line x1="0" y1="810" x2="720" y2="810"/>
    <line x1="180" y1="450" x2="180" y2="900"/>
    <line x1="360" y1="450" x2="360" y2="900"/>
    <line x1="540" y1="450" x2="540" y2="900"/>
  </g>

  <!-- Very subtle geometric mark — large circle, lower portion -->
  <circle cx="360" cy="680" r="240" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <circle cx="360" cy="680" r="180" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.8"/>

  <!-- Depth vignette -->
  <rect width="720" height="900" fill="url(#vignette)"/>
</svg>
