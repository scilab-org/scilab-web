<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Base parchment gradient -->
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="55%" stop-color="#ede6d8"/>
      <stop offset="100%" stop-color="#e0d5c4"/>
    </linearGradient>

    <!-- Vignette for depth -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="80%">
      <stop offset="60%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#1a140d" stop-opacity="0.18"/>
    </radialGradient>

    <!-- Left readability overlay gradient -->
    <linearGradient id="leftOverlay" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbf9f5" stop-opacity="0.82"/>
      <stop offset="55%" stop-color="#fbf9f5" stop-opacity="0.60"/>
      <stop offset="100%" stop-color="#fbf9f5" stop-opacity="0"/>
    </linearGradient>

    <!-- Subtle texture noise filter -->
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="multiply" result="blended"/>
      <feComponentTransfer in="blended">
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>

    <!-- Glow for molecular nodes -->
    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Base layer ──────────────────────────────────────────── -->
  <rect width="1440" height="900" fill="url(#base)"/>

  <!-- ── Fine grid lines (manuscript grid) ─────────────────── -->
  <!-- Horizontal lines -->
  <g stroke="#8B7355" stroke-opacity="0.10" stroke-width="0.5">
    <line x1="0" y1="60"  x2="1440" y2="60"/>
    <line x1="0" y1="120" x2="1440" y2="120"/>
    <line x1="0" y1="180" x2="1440" y2="180"/>
    <line x1="0" y1="240" x2="1440" y2="240"/>
    <line x1="0" y1="300" x2="1440" y2="300"/>
    <line x1="0" y1="360" x2="1440" y2="360"/>
    <line x1="0" y1="420" x2="1440" y2="420"/>
    <line x1="0" y1="480" x2="1440" y2="480"/>
    <line x1="0" y1="540" x2="1440" y2="540"/>
    <line x1="0" y1="600" x2="1440" y2="600"/>
    <line x1="0" y1="660" x2="1440" y2="660"/>
    <line x1="0" y1="720" x2="1440" y2="720"/>
    <line x1="0" y1="780" x2="1440" y2="780"/>
    <line x1="0" y1="840" x2="1440" y2="840"/>
  </g>
  <!-- Vertical lines -->
  <g stroke="#8B7355" stroke-opacity="0.08" stroke-width="0.5">
    <line x1="80"   y1="0" x2="80"   y2="900"/>
    <line x1="160"  y1="0" x2="160"  y2="900"/>
    <line x1="240"  y1="0" x2="240"  y2="900"/>
    <line x1="320"  y1="0" x2="320"  y2="900"/>
    <line x1="400"  y1="0" x2="400"  y2="900"/>
    <line x1="480"  y1="0" x2="480"  y2="900"/>
    <line x1="560"  y1="0" x2="560"  y2="900"/>
    <line x1="640"  y1="0" x2="640"  y2="900"/>
    <line x1="720"  y1="0" x2="720"  y2="900"/>
    <line x1="800"  y1="0" x2="800"  y2="900"/>
    <line x1="880"  y1="0" x2="880"  y2="900"/>
    <line x1="960"  y1="0" x2="960"  y2="900"/>
    <line x1="1040" y1="0" x2="1040" y2="900"/>
    <line x1="1120" y1="0" x2="1120" y2="900"/>
    <line x1="1200" y1="0" x2="1200" y2="900"/>
    <line x1="1280" y1="0" x2="1280" y2="900"/>
    <line x1="1360" y1="0" x2="1360" y2="900"/>
  </g>

  <!-- ── Accent rule lines (heavier cadence) ────────────────── -->
  <g stroke="#6B5334" stroke-opacity="0.12" stroke-width="1">
    <line x1="0" y1="0"   x2="1440" y2="0"/>
    <line x1="0" y1="300" x2="1440" y2="300"/>
    <line x1="0" y1="600" x2="1440" y2="600"/>
    <line x1="0" y1="900" x2="1440" y2="900"/>
    <line x1="0"    y1="0" x2="0"    y2="900"/>
    <line x1="480"  y1="0" x2="480"  y2="900"/>
    <line x1="960"  y1="0" x2="960"  y2="900"/>
    <line x1="1440" y1="0" x2="1440" y2="900"/>
  </g>

  <!-- ── Data-flow curves (flowing left→right) ─────────────── -->
  <g fill="none" stroke-linecap="round">
    <!-- Primary flow arc — amber -->
    <path d="M 820,120 C 920,140 1020,200 1100,280 S 1280,400 1380,380"
          stroke="#c07a2a" stroke-opacity="0.18" stroke-width="1.5"/>
    <!-- Secondary flow — plum -->
    <path d="M 760,320 C 860,290 980,310 1080,360 S 1260,480 1380,510"
          stroke="#7d5a7a" stroke-opacity="0.16" stroke-width="1.2"/>
    <!-- Tertiary — charcoal -->
    <path d="M 800,560 C 880,520 980,490 1100,500 S 1320,560 1400,620"
          stroke="#3d2f20" stroke-opacity="0.12" stroke-width="1"/>
    <!-- Quaternary — warm amber -->
    <path d="M 900,700 C 1000,670 1100,640 1200,650 S 1380,690 1420,740"
          stroke="#c07a2a" stroke-opacity="0.12" stroke-width="1"/>
    <!-- Wide shallow arc — plum -->
    <path d="M 640,80 C 800,60 1000,100 1180,160 S 1380,260 1420,320"
          stroke="#7d5a7a" stroke-opacity="0.10" stroke-width="0.8"/>
  </g>

  <!-- ── Molecular network (right-center region) ───────────── -->
  <!-- Bonds / edges -->
  <g stroke="#6B5334" stroke-opacity="0.20" stroke-width="0.8" fill="none">
    <!-- Cluster A around (1100, 280) -->
    <line x1="1050" y1="240" x2="1100" y2="280"/>
    <line x1="1100" y1="280" x2="1160" y2="250"/>
    <line x1="1100" y1="280" x2="1110" y2="340"/>
    <line x1="1100" y1="280" x2="1050" y2="310"/>
    <line x1="1160" y1="250" x2="1210" y2="270"/>
    <line x1="1110" y1="340" x2="1070" y2="380"/>
    <line x1="1110" y1="340" x2="1160" y2="370"/>
    <!-- Cluster B around (1250, 450) -->
    <line x1="1200" y1="420" x2="1250" y2="450"/>
    <line x1="1250" y1="450" x2="1310" y2="430"/>
    <line x1="1250" y1="450" x2="1260" y2="510"/>
    <line x1="1310" y1="430" x2="1360" y2="460"/>
    <line x1="1260" y1="510" x2="1220" y2="540"/>
    <!-- Bridge A→B -->
    <line x1="1160" y1="370" x2="1200" y2="420"/>
    <line x1="1210" y1="270" x2="1310" y2="430"/>
    <!-- Cluster C around (1050, 580) -->
    <line x1="990"  y1="560" x2="1050" y2="580"/>
    <line x1="1050" y1="580" x2="1100" y2="560"/>
    <line x1="1050" y1="580" x2="1040" y2="640"/>
    <line x1="1040" y1="640" x2="1000" y2="670"/>
    <line x1="1040" y1="640" x2="1090" y2="670"/>
    <line x1="1220" y1="540" x2="1100" y2="560"/>
    <!-- Cluster D around (1320, 620) -->
    <line x1="1280" y1="600" x2="1320" y2="620"/>
    <line x1="1320" y1="620" x2="1370" y2="600"/>
    <line x1="1320" y1="620" x2="1325" y2="680"/>
    <line x1="1360" y1="460" x2="1280" y2="600"/>
    <!-- Extra cross-links -->
    <line x1="1100" y1="560" x2="1280" y2="600"/>
    <line x1="1050" y1="310" x2="990"  y2="560"/>
    <!-- Upper-right satellite -->
    <line x1="1280" y1="140" x2="1320" y2="180"/>
    <line x1="1320" y1="180" x2="1370" y2="155"/>
    <line x1="1320" y1="180" x2="1310" y2="230"/>
    <line x1="1310" y1="230" x2="1360" y2="460" stroke-opacity="0.10"/>
    <line x1="1050" y1="240" x2="1280" y2="140" stroke-opacity="0.10"/>
  </g>

  <!-- Molecular nodes -->
  <g filter="url(#nodeGlow)">
    <!-- Primary nodes — amber -->
    <circle cx="1100" cy="280" r="4.5" fill="#c07a2a" fill-opacity="0.55"/>
    <circle cx="1250" cy="450" r="4"   fill="#c07a2a" fill-opacity="0.50"/>
    <circle cx="1050" cy="580" r="4"   fill="#c07a2a" fill-opacity="0.50"/>
    <circle cx="1320" cy="620" r="3.5" fill="#c07a2a" fill-opacity="0.45"/>
    <!-- Secondary nodes — plum -->
    <circle cx="1050" cy="240" r="3"   fill="#7d5a7a" fill-opacity="0.50"/>
    <circle cx="1160" cy="250" r="3"   fill="#7d5a7a" fill-opacity="0.45"/>
    <circle cx="1110" cy="340" r="3"   fill="#7d5a7a" fill-opacity="0.45"/>
    <circle cx="1210" cy="270" r="2.5" fill="#7d5a7a" fill-opacity="0.40"/>
    <circle cx="1200" cy="420" r="3"   fill="#7d5a7a" fill-opacity="0.45"/>
    <circle cx="1310" cy="430" r="3"   fill="#7d5a7a" fill-opacity="0.40"/>
    <circle cx="1260" cy="510" r="2.5" fill="#7d5a7a" fill-opacity="0.40"/>
    <circle cx="1360" cy="460" r="2.5" fill="#7d5a7a" fill-opacity="0.40"/>
    <circle cx="990"  cy="560" r="2.5" fill="#7d5a7a" fill-opacity="0.40"/>
    <circle cx="1100" cy="560" r="2.5" fill="#7d5a7a" fill-opacity="0.40"/>
    <circle cx="1040" cy="640" r="3"   fill="#7d5a7a" fill-opacity="0.45"/>
    <circle cx="1280" cy="600" r="2.5" fill="#7d5a7a" fill-opacity="0.40"/>
    <circle cx="1325" cy="680" r="2"   fill="#7d5a7a" fill-opacity="0.35"/>
    <!-- Tertiary nodes — charcoal -->
    <circle cx="1070" cy="380" r="2"   fill="#3d2f20" fill-opacity="0.35"/>
    <circle cx="1160" cy="370" r="2"   fill="#3d2f20" fill-opacity="0.35"/>
    <circle cx="1220" cy="540" r="2"   fill="#3d2f20" fill-opacity="0.35"/>
    <circle cx="1050" cy="310" r="2"   fill="#3d2f20" fill-opacity="0.35"/>
    <circle cx="1000" cy="670" r="2"   fill="#3d2f20" fill-opacity="0.35"/>
    <circle cx="1090" cy="670" r="2"   fill="#3d2f20" fill-opacity="0.35"/>
    <circle cx="1280" cy="140" r="3"   fill="#3d2f20" fill-opacity="0.30"/>
    <circle cx="1320" cy="180" r="3"   fill="#3d2f20" fill-opacity="0.30"/>
    <circle cx="1370" cy="155" r="2"   fill="#3d2f20" fill-opacity="0.28"/>
    <circle cx="1310" cy="230" r="2"   fill="#3d2f20" fill-opacity="0.28"/>
    <circle cx="1370" cy="600" r="2"   fill="#3d2f20" fill-opacity="0.28"/>
  </g>

  <!-- ── Scatter plot (upper-right, data visualization motif) ── -->
  <g fill-opacity="0.35">
    <!-- amber dots -->
    <circle cx="870" cy="95"  r="3" fill="#c07a2a"/>
    <circle cx="905" cy="75"  r="2" fill="#c07a2a"/>
    <circle cx="942" cy="110" r="2.5" fill="#c07a2a"/>
    <circle cx="975" cy="65"  r="2" fill="#c07a2a"/>
    <circle cx="920" cy="140" r="2" fill="#c07a2a"/>
    <circle cx="860" cy="125" r="1.5" fill="#c07a2a"/>
    <circle cx="990" cy="90"  r="2" fill="#c07a2a"/>
    <!-- plum dots -->
    <circle cx="850" cy="80"  r="2" fill="#7d5a7a"/>
    <circle cx="885" cy="55"  r="2.5" fill="#7d5a7a"/>
    <circle cx="960" cy="50"  r="2" fill="#7d5a7a"/>
    <circle cx="1000" cy="80" r="2" fill="#7d5a7a"/>
    <circle cx="830"  cy="110" r="2" fill="#7d5a7a"/>
    <circle cx="958"  cy="145" r="2" fill="#7d5a7a"/>
    <!-- Axis lines for scatter -->
    <line x1="820" y1="165" x2="1010" y2="165" stroke="#6B5334" stroke-opacity="0.20" stroke-width="0.8"/>
    <line x1="820" y1="165" x2="820"  y2="50"  stroke="#6B5334" stroke-opacity="0.20" stroke-width="0.8"/>
    <!-- Trend line -->
    <line x1="830" y1="155" x2="1005" y2="58" stroke="#c07a2a" stroke-opacity="0.22" stroke-width="1" stroke-dasharray="4 3"/>
  </g>

  <!-- ── Manuscript structure marks (right panel, mid-right) ── -->
  <g fill="none" stroke="#3d2f20" stroke-opacity="0.12">
    <!-- Column rule lines simulating text columns -->
    <line x1="900" y1="200" x2="980" y2="200" stroke-width="3" stroke-linecap="round"/>
    <line x1="900" y1="213" x2="1000" y2="213" stroke-width="2"/>
    <line x1="900" y1="224" x2="990" y2="224" stroke-width="2"/>
    <line x1="900" y1="235" x2="1005" y2="235" stroke-width="2"/>
    <line x1="900" y1="246" x2="975" y2="246" stroke-width="2"/>
    <line x1="900" y1="257" x2="995" y2="257" stroke-width="2"/>
    <line x1="900" y1="268" x2="960" y2="268" stroke-width="2"/>
    <!-- Section heading -->
    <line x1="900" y1="285" x2="1010" y2="285" stroke-width="3.5" stroke-linecap="round" stroke-opacity="0.18"/>
    <line x1="900" y1="298" x2="1000" y2="298" stroke-width="2"/>
    <line x1="900" y1="309" x2="990" y2="309" stroke-width="2"/>
    <line x1="900" y1="320" x2="1005" y2="320" stroke-width="2"/>
    <!-- Indent for subtext -->
    <line x1="912" y1="331" x2="990" y2="331" stroke-width="1.5"/>
    <line x1="912" y1="340" x2="998" y2="340" stroke-width="1.5"/>
    <!-- Footnote divider -->
    <line x1="900" y1="360" x2="940" y2="360" stroke-width="0.8"/>
    <line x1="900" y1="370" x2="1000" y2="370" stroke-width="1"/>
    <line x1="900" y1="379" x2="980" y2="379" stroke-width="1"/>
  </g>

  <!-- ── Secondary molecular cluster (lower-center area) ──── -->
  <g stroke="#8B7355" stroke-opacity="0.15" stroke-width="0.8" fill="none">
    <line x1="680" y1="750" x2="730" y2="780"/>
    <line x1="730" y1="780" x2="790" y2="760"/>
    <line x1="730" y1="780" x2="720" y2="840"/>
    <line x1="790" y1="760" x2="840" y2="790"/>
    <line x1="720" y1="840" x2="770" y2="850"/>
    <line x1="840" y1="790" x2="880" y2="770"/>
    <line x1="880" y1="770" x2="900" y2="820"/>
  </g>
  <g fill-opacity="0.28">
    <circle cx="730" cy="780" r="3"   fill="#c07a2a"/>
    <circle cx="790" cy="760" r="2.5" fill="#7d5a7a"/>
    <circle cx="720" cy="840" r="2.5" fill="#7d5a7a"/>
    <circle cx="840" cy="790" r="2"   fill="#3d2f20"/>
    <circle cx="880" cy="770" r="2"   fill="#3d2f20"/>
    <circle cx="680" cy="750" r="2"   fill="#7d5a7a"/>
    <circle cx="900" cy="820" r="2"   fill="#c07a2a"/>
  </g>

  <!-- ── Decorative corner marks ─────────────────────────────── -->
  <!-- Top-right corner bracket -->
  <g stroke="#6B5334" stroke-opacity="0.20" stroke-width="1" fill="none">
    <path d="M 1420,20 L 1420,50 L 1390,50"/>
    <path d="M 1390,20 L 1420,20"/>
  </g>
  <!-- Bottom-right corner bracket -->
  <g stroke="#6B5334" stroke-opacity="0.20" stroke-width="1" fill="none">
    <path d="M 1420,880 L 1420,850 L 1390,850"/>
    <path d="M 1390,880 L 1420,880"/>
  </g>
  <!-- Bottom-left corner bracket -->
  <g stroke="#6B5334" stroke-opacity="0.15" stroke-width="1" fill="none">
    <path d="M 20,880 L 20,850 L 50,850"/>
    <path d="M 20,880 L 50,880"/>
  </g>

  <!-- ── Fine annotation ticks (right margin) ───────────────── -->
  <g stroke="#6B5334" stroke-opacity="0.14" stroke-width="0.6">
    <line x1="1425" y1="60"  x2="1440" y2="60"/>
    <line x1="1428" y1="120" x2="1440" y2="120"/>
    <line x1="1428" y1="180" x2="1440" y2="180"/>
    <line x1="1425" y1="240" x2="1440" y2="240"/>
    <line x1="1428" y1="300" x2="1440" y2="300"/>
    <line x1="1428" y1="360" x2="1440" y2="360"/>
    <line x1="1428" y1="420" x2="1440" y2="420"/>
    <line x1="1425" y1="480" x2="1440" y2="480"/>
    <line x1="1428" y1="540" x2="1440" y2="540"/>
    <line x1="1428" y1="600" x2="1440" y2="600"/>
    <line x1="1428" y1="660" x2="1440" y2="660"/>
    <line x1="1425" y1="720" x2="1440" y2="720"/>
    <line x1="1428" y1="780" x2="1440" y2="780"/>
    <line x1="1428" y1="840" x2="1440" y2="840"/>
    <!-- Top margin ticks -->
    <line x1="240"  y1="0" x2="240"  y2="12"/>
    <line x1="480"  y1="0" x2="480"  y2="15"/>
    <line x1="720"  y1="0" x2="720"  y2="12"/>
    <line x1="960"  y1="0" x2="960"  y2="15"/>
    <line x1="1200" y1="0" x2="1200" y2="12"/>
    <!-- Bottom margin ticks -->
    <line x1="240"  y1="900" x2="240"  y2="888"/>
    <line x1="480"  y1="900" x2="480"  y2="885"/>
    <line x1="720"  y1="900" x2="720"  y2="888"/>
    <line x1="960"  y1="900" x2="960"  y2="885"/>
    <line x1="1200" y1="900" x2="1200" y2="888"/>
  </g>

  <!-- ── Large faint background glyph (scientific texture) ─── -->
  <!-- Faint hexagonal lattice fragment, center-right -->
  <g stroke="#8B7355" stroke-opacity="0.06" stroke-width="1" fill="none">
    <polygon points="1150,400 1175,385 1200,400 1200,430 1175,445 1150,430"/>
    <polygon points="1200,400 1225,385 1250,400 1250,430 1225,445 1200,430"/>
    <polygon points="1250,400 1275,385 1300,400 1300,430 1275,445 1250,430"/>
    <polygon points="1175,445 1200,430 1225,445 1225,475 1200,490 1175,475"/>
    <polygon points="1225,445 1250,430 1275,445 1275,475 1250,490 1225,475"/>
    <polygon points="1150,355 1175,340 1200,355 1200,385 1175,400 1150,385"/>
    <polygon points="1200,355 1225,340 1250,355 1250,385 1225,400 1200,385"/>
  </g>

  <!-- ── Vignette overlay ────────────────────────────────────── -->
  <rect width="1440" height="900" fill="url(#vignette)"/>

  <!-- ── Left readability overlay ───────────────────────────── -->
  <rect width="1440" height="900" fill="url(#leftOverlay)"/>
</svg>
